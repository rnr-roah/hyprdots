source = ~/.config/hypr/matugen-colors.conf
# BACKGROUND

background {
    monitor =
    path = ~/Wallpapers/default/background.png
    blur_passes = 1
    blur_size = 10
    contrast = 0.8916
    brightness = 0.6172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = true
    grace = 0
    disable_loading_bar = false
    disable_loading = true # for howdy
    # This tells hyprlock to attempt to unlock 
    # as soon as the lock screen starts
    pam_module = hyprlock
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 80
    outline_thickness = 5
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(100, 114, 125, 0.5)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = SF Pro Display Bold
    placeholder_text = <i><span foreground="##ffffff99">Press Enter to Scan.</span></i>
    text = "scanning..."
    hide_input = false
    position = 0, -750
    halign = center
    valign = center
	#for howdy
    check_color = rgb(57, 255, 20) 
    fail_color = rgb(204, 34, 34)
    immediate_render = true
}

# Hour-Time
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%H")"
    #color = rgba(109, 229, 250, 1)
    color = $primary
    font_size = 180
    font_family = AlfaSlabOne 
    position = 0, 300
    halign = center
    valign = center
}

# Minute-Time
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%M")"
    #color = rgba(255, 255, 255, .6)
    color = $on_primary_container
    font_size = 180
    font_family = AlfaSlabOne
    position = 0, 75
    halign = center
    valign = center
}

# Day-Date-Month
label {
    monitor =
    #text = cmd[update:1000] echo "<span color='##ffffff99'>$(date '+%A, ')</span><span color='##6de5fa'>$(date '+%d %B')</span>"
text = cmd[update:1000] source ~/.config/hypr/hyprlock-colors.sh && echo "<span color='$ML_PRIMARY'>$(date '+%A, ')</span><span color='$ML_ON_PRIMARY_CONTAINER'>$(date '+%d %B')</span>"    
font_size = 30
    font_family = SF Pro Display Bold
    position = 0, -80
    halign = center
    valign = center
    color = $primary
    #color = #ffb90099
}




# CURRENT SONG
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/playerdetails.sh)"
    #color = rgba(255, 255, 255, 0.7)
    color = $primary
    font_size = 18
    font_family = JetBrains Mono Nerd, SF Pro Display Bold
    position = 0, 20
    halign = center
    valign = bottom
}
