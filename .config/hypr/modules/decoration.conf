decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    rounding = 10
    #screen_shader = /home/roah/.config/hypr/Scripts/grayscale.glsl
    blur {
        enabled = true
        size = 15
        passes = 2
	ignore_opacity = true
	noise = 0.01
	contrast = 0.8
	xray = false
	new_optimizations = true
    }
   dim_inactive = false
   active_opacity = 1 
   inactive_opacity = 0.95

