general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 2
    #gaps_out = 5
    # order of gapes sides: top, right, bottom, left
    #gaps_out =  5, 5, 5, 0
    gaps_out =  0
    border_size = 2
    layout = dwindle
    allow_tearing = false
#conf below added from https://github.com/yugaaank/dotfiles/blob/main/hypr/hyprland/colors.conf
    #col.active_border = rgba(968f8ddd)
    #col.inactive_border = rgba(000000ee
    col.active_border = $primary
    col.inactive_border = $on_primary
}

misc {
    background_color = rgba(161311FF)
}

plugin {
    hyprbars {
        # Honestly idk if it works like css, but well, why not
        bar_text_font = Google Sans Flex Medium, Rubik, Geist, AR One Sans, Reddit Sans, Inter, Roboto, Ubuntu, Noto Sans, sans-serif
        bar_height = 30
        bar_padding = 10
        bar_button_padding = 5
        bar_precedence_over_border = true
        bar_part_of_window = true

        bar_color = rgba(161311FF)
        col.text = rgba(e9e1deFF)


        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(e9e1de), 13, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb(e9e1de), 13, 󰖯, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(e9e1de), 13, 󰖰, hyprctl dispatch movetoworkspacesilent special
    }

}




