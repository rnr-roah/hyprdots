#### Needed for Blur in Swaync/Notification Center ####
# layerrule = blur, swaync-control-center
# layerrule = blur, swaync-notification-window

# layerrule = ignorezero, swaync-control-center
# layerrule = ignorezero, swaync-notification-window

# layerrule = ignorealpha 0.5, swaync-control-center
# layerrule = ignorealpha 0.5, swaync-notification-window

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf
# source = ~/.config/hypr/myColors.conf
layerrule = animation slide bottom, match:namespace ^rofi$
layerrule = blur on, match:namespace ^rofi$
layerrule = match:namespace rofi, ignore_alpha 0
animation = layers, 1, 0.5, default, slide
layerrule = blur on, match:namespace ^swaync-control-center$
layerrule = blur on, match:namespace ^swaync-notification-window$

layerrule = ignore_alpha 0.0, match:namespace ^swaync-control-center$
layerrule = ignore_alpha 0.0, match:namespace ^swaync-notification-window$

#permission = regex, permission, mode
permission = .* , screencopy, deny

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
#windowrulev2 = float,class:^(shutdown)$,title:^(alacritty)$
# windowrule=float, class:kitty, title:kitty
# windowrule=float, class:feh, title:feh
# windowrule=float, class:mpv, title:mpv
# windowrule=float, class:it.mijorus.smile, title:Smile
# windowrule=float, class:chrome-google.com__-Default, title:google.com_/
# windowrule=float, class:org.pulseaudio.pavucontrol, title:Volume Control
windowrule = float on, match:class ^Alacritty$
windowrule = float on, match:class ^feh$
windowrule = float on, match:class ^mpv$
windowrule = float on, match:class ^it.mijorus.smile$
windowrule = float on, match:class ^chrome-google.com__-Default$
windowrule = float on, match:class ^chrome-claude.com__-Default$
windowrule = float on, match:class ^chrome-chatgpt.com__-Default$
windowrule = float on, match:class ^chrome-gemini.google.com__-Default$
windowrule = float on, match:class ^chrome-web.whatsapp.com__-Default$
windowrule = float on, match:class ^org.pulseaudio.pavucontrol$
windowrule = float on, match:class ^micro$
windowrule = float on, match:class ^scratchpad$
windowrule = workspace 10, match:class ^genshinimpact.exe$
windowrule = fullscreen on, match:class ^genshinimpact.exe$
$scratchpad = class:^(scratchpad)$
$scratchpadsize = size 60% 65%
